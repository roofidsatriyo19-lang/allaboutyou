<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Letter for You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="loader-wrapper" class="fixed inset-0 bg-gradient-to-br from-[var(--bg-color)] to-[var(--paper-bg)] flex flex-col items-center justify-center z-[9999] opacity-100 transition-opacity duration-800">
        <div class="loader"></div>
        <p class="text-[var(--text-color)] text-base font-light tracking-widest animate-pulse">Menyiapkan surat...</p>
    </div>

    <div id="nameInputSection" class="fixed inset-0 bg-[var(--bg-color)] z-[2000] flex flex-col items-center justify-center transition-all duration-500 p-5 backdrop-blur-[10px] border-b-2 border-[var(--accent-color)] shadow-2xl" style="background: rgba(var(--bg-color), 0.95) !important;">
        <p class="text-[var(--text-color)] mb-5 font-georgia text-1.1rem text-center font-semibold tracking-0.5px bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary)] bg-clip-text text-transparent">Masukkan namamu dulu ya:</p>
        <div class="flex gap-2.5 flex-wrap justify-center w-full max-w-[400px]">
            <input type="text" id="userName" placeholder="Nama kamu..." 
                class="px-5 py-3 rounded-full border-2 border-[var(--accent-color)] outline-none text-center font-inherit min-w-[150px] flex-1 transition-all duration-300 bg-white bg-opacity-10 text-[var(--text-color)] placeholder:text-[color-mix(in_srgb,_var(--text-color)_50%,_transparent)]">
            <button onclick="saveName()" class="px-6 py-2.5 rounded-full bg-[var(--accent-color)] text-white border-none cursor-pointer font-bold transition-all duration-300 whitespace-nowrap hover:translate-y-[-3px] hover:shadow-[0_8px_20px_var(--shadow)] active:translate-y-[-1px]">Lanjut</button>
        </div>
    </div>

    <div class="theme-menu fixed top-0 right-0 left-0 flex gap-2 items-center justify-center p-3.75 bg-gradient-to-b from-[var(--paper-bg)] to-transparent z-[1000] flex-wrap backdrop-blur-lg border-b border-[color-mix(in_srgb,_var(--accent-color)_20%,_transparent)]">
        <button onclick="setTheme('midnight')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">🌙 Midnight</button>
        <button onclick="setTheme('rose')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">🌸 Rose</button>
        <button onclick="setTheme('sunset')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">🌅 Sunset</button>
        <button onclick="setTheme('forest')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">🌲 Forest</button>
        <button onclick="setTheme('ocean')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">🌊 Ocean</button>
        <button onclick="setTheme('parchment')" class="px-3.5 py-2 rounded-full border-2 border-[var(--accent-color)] bg-[rgba(var(--accent-color),_0.1)] text-[var(--text-color)] cursor-pointer text-sm font-semibold transition-all duration-300 whitespace-nowrap tracking-0.5px hover:bg-[var(--accent-color)] hover:text-[var(--bg-color)] hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">📜 Parchment</button>
        
        <select id="musicSelect" onchange="changeMusic(this.value)" class="px-2.5 py-1.25 rounded-full border-none bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary)] text-white text-xs cursor-pointer outline-none font-mono transition-all duration-300 hover:translate-y-[-2px] hover:shadow-[0_6px_20px_var(--shadow)]">
            <option value="about-you.mp3">🎵 The 1975</option>
            <option value="sal-priadi.mp3">🎵 Sal Priadi</option>
            <option value="payung-teduh.mp3">🎵 Payung Teduh</option>
        </select>
    </div>

    <div class="container max-w-[700px] mx-auto my-[120px_40px] p-5 animate-fadeIn">
        <div class="intro text-center text-4xl font-light mb-10 text-[var(--text-color)] animate-fadeInScale tracking-widest italic opacity-90">
            i hope you read this, even if it's too late. Tap the envelope below to open the letter.
        </div>

        <div class="button-wrapper cursor-pointer my-10 animate-bounceIn" id="envelopeWrapper" onclick="openEnvelope()" style="display: none;">
            <p class="tap-instruction"> </p>
        </div>

        <div class="letter bg-gradient-to-br from-[var(--paper-bg)] to-[color-mix(in_srgb,_var(--paper-bg)_95%,_var(--accent-color))] rounded-xl p-[45px_40px] shadow-2xl leading-relaxed text-1.05rem text-[var(--paper-text)] hidden animate-slideUp border-2 border-[color-mix(in_srgb,_var(--accent-color)_30%,_transparent)] relative overflow-hidden" id="letterBox">
            <div id="typedText" class="font-georgia tracking-widest leading-8 relative z-10 whitespace-pre-wrap break-words animate-typeWriterShow"></div>
            <img src="ttd.png" alt="Signature" class="signature max-w-[150px] opacity-0 mt-[30px] filter drop-shadow-lg transition-opacity duration-1000 animate-signatureFloat relative z-10" />

            <div id="replySection" style="display: none;" class="animate-slideDown mt-[30px] border-t-2 border-dashed border-[var(--paper-line)] pt-5">
                <p class="italic text-sm text-[var(--paper-text)] mb-4">Sudah baca?, Mau kirim balasan singkat?</p>
                <form id="replyForm" action="https://formspree.io/f/xpqjlyrv" method="POST">
                    <textarea name="message" placeholder="Tulis pesanmu disini.." required 
                        class="w-full h-20 p-2.5 rounded-lg border border-[var(--paper-line)] font-inherit bg-white bg-opacity-5 mt-2.5 box-border resize-vertical text-[var(--paper-text)] placeholder:text-[color-mix(in_srgb,_var(--paper-text)_50%,_transparent)] transition-all duration-300 focus:bg-white focus:bg-opacity-10 focus:shadow-[0_0_20px_var(--shadow)] focus:outline-none focus:border-[var(--accent-color)]"></textarea>
                    <button type="submit" class="mt-2.5 px-5 py-2 bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary)] text-white border-none rounded-full cursor-pointer font-bold w-full text-base transition-all duration-300 relative overflow-hidden hover:translate-y-[-3px] hover:shadow-[0_10px_30px_var(--shadow)] disabled:opacity-70 disabled:cursor-not-allowed">
                        <span class="relative z-10">Kirim Balasan</span>
                    </button>
                </form>
                <p id="thankYouNote" style="display:none;" class="text-green-500 font-bold mt-2.5 text-center animate-popIn">Pesanmu sudah terkirim ke dia!, Tunggu 2 detik yaa ✨</p>
            </div>

            <div id="videoSection" style="display: none;" class="animate-slideDown mt-[30px] text-center">
                <p class="italic text-sm text-[var(--paper-text)] mb-4">Teman-temanku ingin menyemangati mu juga...</p>
                <video controls width="100%" height="auto" style="max-width: 600px; border-radius: 10px; box-shadow: 0 4px 20px var(--shadow); border: 2px solid var(--accent-color);" class="mx-auto">
                    <source src="WhatsApp Video 2026-04-13 at 2.13.37 PM.mp4" type="video/mp4">
                    Browser Anda tidak mendukung tag video.
                </video>
            </div>
        </div>
    </div> 

    <audio id="bgMusic" loop>
        <source src="about-you.mp3" type="audio/mpeg" />
        <source src="sal-priadi.mp3" type="audio/mpeg" />
        <source src="payung-teduh.mp3" type="audio/mpeg" />
    </audio>

    <div class="flower-fall-container fixed top-0 left-0 w-full h-screen pointer-events-none z-50 overflow-hidden" id="flowerFallContainer"></div>
    
    <div id="volumeToggle" class="volume-icon fixed bottom-7.5 left-7.5 w-12.5 h-12.5 bg-gradient-to-br from-[var(--accent-color)] to-[var(--secondary)] rounded-full hidden items-center justify-center text-2xl cursor-pointer transition-all duration-300 shadow-lg animate-slideInLeft z-[100]" onclick="toggleMute()">
        <span id="volSymbol">🔊</span>
    </div>

    <button id="btnNext" class="next-btn-fixed fixed bottom-7.5 right-7.5 px-8 py-4 bg-gradient-to-r from-[var(--accent-color)] to-[var(--secondary)] text-white border-none rounded-full cursor-pointer font-bold text-sm shadow-2xl transition-all duration-300 z-[100] hidden tracking-wider uppercase animate-slideInRight animate-pulse" onclick="readSecondLetter()">
lagi 👉
    </button>

    <script src="script.js"></script>
</body>
</html>
